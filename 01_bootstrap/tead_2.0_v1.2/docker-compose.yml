services:
  # --- S3-compatible storage ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data

  # Create buckets for Iceberg warehouse + MLflow artifacts
  mc:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/warehouse;
      mc mb -p local/mlflow;
      exit 0;
      "

  # --- Iceberg catalog (Hive Metastore + DB) ---
  metastore-db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: metastore_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - metastore-db:/var/lib/mysql

  hive-metastore:
    image: bitsondatadev/hive-metastore:latest
    depends_on: [metastore-db, minio]
    ports:
      - "9083:9083"
    environment:
      METASTORE_DB_HOSTNAME: metastore-db
      METASTORE_TYPE: mysql
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./hive/conf:/opt/apache-hive-metastore-3.0.0-bin/conf:ro

  trino:
    image: trinodb/trino:468
    depends_on: [hive-metastore]
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
      - trino-data:/data/trino

  mlflow-db:
    image: postgres:16
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    volumes:
      - mlflow-db:/var/lib/postgresql/data



  grafana:
    image: grafana/grafana:11.1.0
    depends_on: [trino]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: trinodb-trino-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

  mlflow:
    build:
      context: mlflow
      dockerfile: mlflow/Dockerfile
    image: tead-mlflow:v3.10.1
    depends_on: [mlflow-db, minio, mc]
    ports:
      - "15000:5000"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --allowed-hosts "localhost:5000,localhost:15000,host.docker.internal:15000,host.docker.internal:5000"
      --backend-store-uri postgresql://mlflow:mlflow@mlflow-db:5432/mlflow
      --default-artifact-root s3://mlflow/
volumes:
  minio-data:
  metastore-db:
  mlflow-db:
  trino-data:
  grafana-data:
