services:
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: tead-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    networks:
      - tead-net

  mc:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: tead-mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb -p local/${MINIO_WAREHOUSE_BUCKET} || true;
      mc mb -p local/${MINIO_MLFLOW_BUCKET} || true;
      exit 0;
      "
    networks:
      - tead-net

  metastore-db:
    image: mariadb:10.11
    container_name: tead-metastore-db
    environment:
      MYSQL_ROOT_PASSWORD: ${METASTORE_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${METASTORE_DB_NAME}
      MYSQL_USER: ${METASTORE_DB_USER}
      MYSQL_PASSWORD: ${METASTORE_DB_PASSWORD}
    volumes:
      - metastore-db:/var/lib/mysql
    networks:
      - tead-net

  hive-metastore:
    image: bitsondatadev/hive-metastore:3.1.3
    container_name: tead-hive-metastore
    depends_on:
      - metastore-db
      - minio
    ports:
      - "${HIVE_METASTORE_PORT}:9083"
    environment:
      METASTORE_DB_HOSTNAME: metastore-db
      METASTORE_TYPE: mysql
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ../../hive/conf:/opt/apache-hive-metastore-3.0.0-bin/conf:ro
    networks:
      - tead-net

  trino:
    image: trinodb/trino:468
    container_name: tead-trino
    depends_on:
      - hive-metastore
    ports:
      - "${TRINO_PORT}:8080"
    volumes:
      - ../../trino/etc:/etc/trino:ro
      - trino-data:/data/trino
    networks:
      - tead-net

  mlflow-db:
    image: postgres:16
    container_name: tead-mlflow-db
    environment:
      POSTGRES_DB: ${MLFLOW_DB_NAME}
      POSTGRES_USER: ${MLFLOW_DB_USER}
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD}
    volumes:
      - mlflow-db:/var/lib/postgresql/data
    networks:
      - tead-net

  mlflow:
    build:
      context: ../../mlflow
      dockerfile: Dockerfile
    image: tead-mlflow:v2.12.1-pg
    container_name: tead-mlflow
    depends_on:
      - mlflow-db
      - minio
      - mc
    ports:
      - "${MLFLOW_PORT}:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${MLFLOW_DB_USER}:${MLFLOW_DB_PASSWORD}@mlflow-db:5432/${MLFLOW_DB_NAME}
      --default-artifact-root s3://${MINIO_MLFLOW_BUCKET}/
    networks:
      - tead-net

volumes:
  minio-data:
  metastore-db:
  trino-data:
  mlflow-db:

networks:
  tead-net:
    driver: bridge