<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Produção vs Consumo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Dashboard Produção/Consumo</h1>
        <p>Monitorização nacional de energia com comparação entre consumo e produção.</p>
      </header>

      <section class="controls">
        <label for="apiBase">Base da API</label>
        <input id="apiBase" type="text" value="http://localhost:8000" />
        <label for="groupBy">Agregação</label>
        <select id="groupBy">
          <option value="day">Diária</option>
          <option value="month">Mensal</option>
        </select>
        <button id="refreshButton">Atualizar</button>
      </section>

      <section class="kpis" id="kpiCards"></section>

      <section class="tables">
        <article>
          <h2>Série temporal</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Período</th>
                  <th>Consumo total (MWh)</th>
                  <th>Produção total (MWh)</th>
                  <th>Saldo (MWh)</th>
                  <th>Leituras</th>
                </tr>
              </thead>
              <tbody id="seriesRows"></tbody>
            </table>
          </div>
        </article>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="./main.js" type="module"></script>
  </body>
</html>
